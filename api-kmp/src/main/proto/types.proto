syntax = "proto3";
package kotlinx.kmp.util;

import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";
import "google/type/latlng.proto";
import "google/type/postal_address.proto";
import "google/type/money.proto";
import "google/type/date.proto";
import "google/type/datetime.proto";
import "google/type/timeofday.proto";
import "google/type/phone_number.proto";
import "google/type/color.proto";

// === Value Types — Wire KMP data classes using Google standard protos ===

// Structured person name (ICU PersonName, Google People API compatible)
message PersonName {
    string given = 1;
    string family = 2;
    string prefix = 3;
    string suffix = 4;
    string middle = 5;
}

// RFC 6350 vCard Contact — full property set parity with ezvcard.VCard.
// Uses google.type where available (PostalAddress, PhoneNumber, Date, LatLng).
message VCardContact {
    // §6.1 General Properties
    string source = 1;                               // SOURCE — vCard origin URI
    string kind = 2;                                 // KIND — individual/group/org/location
    string xml = 3;                                  // XML — extension XML element

    // §6.2 Identification Properties
    PersonName name = 10;                            // FN + N (formatted + structured)
    repeated string nicknames = 11;                  // NICKNAME
    string photo = 12;                               // PHOTO — URI or data URL
    google.type.Date birthday = 13;                  // BDAY
    google.type.Date anniversary = 14;               // ANNIVERSARY
    string gender = 15;                              // GENDER — M/F/O/N/U + identity

    // §6.3 Delivery Addressing Properties
    repeated google.type.PostalAddress addresses = 20; // ADR

    // §6.4 Communications Properties
    repeated google.type.PhoneNumber phones = 30;    // TEL
    repeated string emails = 31;                     // EMAIL (RFC 5321)
    repeated string impp = 32;                       // IMPP — instant messaging URIs (xmpp:, sip:)
    repeated string languages = 33;                  // LANG — preferred communication languages
    string jabber_id = 34;                           // XMPP JID (XEP-0054 JABBERID, bare JID form)

    // §6.5 Geographical Properties
    string timezone = 40;                            // TZ — IANA timezone ID
    google.type.LatLng geo = 41;                     // GEO — lat/lng coordinates

    // §6.6 Organizational Properties
    string title = 50;                               // TITLE — job title
    string role = 51;                                // ROLE — function/role
    string logo = 52;                                // LOGO — org logo URI
    string organization = 53;                        // ORG — organization name
    repeated string org_units = 54;                  // ORG sub-units
    repeated string members = 55;                    // MEMBER — for KIND=group, vCard UIDs
    repeated VCardRelated related = 56;              // RELATED — relationship to other vCards

    // §6.7 Explanatory Properties
    repeated string urls = 59;                       // URL — RFC 6350 §6.7.8
    repeated string categories = 60;                 // CATEGORIES — tags
    string note = 61;                                // NOTE — freeform
    string prodid = 62;                              // PRODID — creating software ID
    string rev = 63;                                 // REV — last revision (ISO 8601)
    string sound = 64;                               // SOUND — pronunciation audio URI
    string uid = 65;                                 // UID — unique identifier (urn:uuid:...)
    repeated VCardClientPidMap client_pid_maps = 66; // CLIENTPIDMAP

    // §6.8 Security Properties
    string key = 70;                                 // KEY — public key URI or data

    // §6.9 Calendar Properties
    string fburl = 80;                               // FBURL — free/busy URL
    string cal_adr_uri = 81;                         // CALADRURI — calendar address (mailto:)
    string cal_uri = 82;                             // CALURI — calendar URI (caldav)

    // RFC 6474 extensions (place of birth/death)
    string birth_place = 90;                         // BIRTHPLACE
    string death_place = 91;                         // DEATHPLACE
    google.type.Date death_date = 92;                // DEATHDATE

    // RFC 6715 extensions (professional)
    repeated string expertise = 100;                 // EXPERTISE
    repeated string hobbies = 101;                   // HOBBY
    repeated string interests = 102;                 // INTEREST
    repeated string org_directories = 103;           // ORG-DIRECTORY

    // Escape hatch for non-standard (X-*) extensions
    map<string, string> extensions = 200;            // X-* properties
}

// RFC 6350 §6.6.6 RELATED property
message VCardRelated {
    string uri = 1;                                  // URI or text (other vCard UID)
    string type = 2;                                 // contact/acquaintance/friend/met/
                                                     // co-worker/colleague/co-resident/neighbor/
                                                     // child/parent/sibling/spouse/kin/muse/
                                                     // crush/date/sweetheart/me/agent/emergency
}

// RFC 6350 §6.7.7 CLIENTPIDMAP property
message VCardClientPidMap {
    int32 pid = 1;                                   // source identifier
    string uri = 2;                                  // globally unique URI
}

// RFC 5545 iCalendar Event — google.protobuf.Timestamp for dates
message ICalEvent {
    string uid = 1;
    string summary = 2;
    string description = 3;
    string location = 4;
    google.protobuf.Timestamp dt_start = 5;
    google.protobuf.Timestamp dt_end = 6;
    google.protobuf.Duration duration = 7;
    string rrule = 8;                                 // RFC 5545 RRULE
    string status = 9;                                // TENTATIVE/CONFIRMED/CANCELLED
    int32 priority = 10;
    string url = 11;
    google.type.LatLng geo = 12;                      // google.type.LatLng
    repeated string categories = 13;
    string organizer = 14;                            // email (mailto:)
    repeated ICalAttendee attendees = 15;
    repeated ICalAlarm alarms = 16;
    google.protobuf.Timestamp created = 17;
    google.protobuf.Timestamp last_modified = 18;
}

// iCal ATTENDEE with parameters (RFC 5545)
message ICalAttendee {
    string email = 1;
    string name = 2;                                  // CN parameter
    string part_stat = 3;                             // NEEDS-ACTION/ACCEPTED/DECLINED/TENTATIVE
    string role = 4;                                  // CHAIR/REQ-PARTICIPANT/OPT-PARTICIPANT
}

// iCal VALARM (RFC 5545 §3.6.6) — can appear in VEVENT or VTODO.
message ICalAlarm {
    string action = 1;                                // AUDIO/DISPLAY/EMAIL/PROCEDURE
    google.protobuf.Duration trigger_duration = 2;    // structured trigger (relative)
    string trigger = 3;                               // raw RFC 5545 (-PT15M or absolute)
    google.protobuf.Duration repeat_duration = 4;     // repeat interval
    int32 repeat_count = 5;
    string description = 6;                           // for DISPLAY/EMAIL action
    string summary = 7;                               // for EMAIL action
    repeated ICalAttendee attendees = 8;              // for EMAIL action
    string attach = 9;                                // for AUDIO action (URI)
}

// RFC 5545 §3.6.2 VTODO — task / to-do item.
message ICalTodo {
    string uid = 1;
    string summary = 2;
    string description = 3;
    string location = 4;
    google.protobuf.Timestamp dt_start = 5;
    google.protobuf.Timestamp due = 6;
    google.protobuf.Timestamp completed = 7;
    google.protobuf.Duration duration = 8;
    string rrule = 9;
    string status = 10;                               // NEEDS-ACTION/COMPLETED/IN-PROCESS/CANCELLED
    int32 priority = 11;
    int32 percent_complete = 12;
    string url = 13;
    google.type.LatLng geo = 14;
    repeated string categories = 15;
    string organizer = 16;
    repeated ICalAttendee attendees = 17;
    repeated ICalAlarm alarms = 18;
    string class_ = 19;                               // PUBLIC/PRIVATE/CONFIDENTIAL
    google.protobuf.Timestamp created = 20;
    google.protobuf.Timestamp last_modified = 21;
    int32 sequence = 22;
    repeated string resources = 23;
    repeated string related_to = 24;
}

// RFC 5545 §3.6.3 VJOURNAL — journal entry / note.
message ICalJournal {
    string uid = 1;
    string summary = 2;
    repeated string description = 3;
    google.protobuf.Timestamp dt_start = 4;
    string status = 5;                                // DRAFT/FINAL/CANCELLED
    string url = 6;
    repeated string categories = 7;
    string organizer = 8;
    repeated ICalAttendee attendees = 9;
    repeated string related_to = 10;
    string class_ = 11;
    google.protobuf.Timestamp created = 12;
    google.protobuf.Timestamp last_modified = 13;
    int32 sequence = 14;
    string rrule = 15;
    repeated string contact = 16;
    repeated string attach = 17;
}

// RFC 5545 §3.6.4 VFREEBUSY — free/busy time info.
message ICalFreeBusy {
    string uid = 1;
    google.protobuf.Timestamp dt_start = 2;
    google.protobuf.Timestamp dt_end = 3;
    string organizer = 4;
    repeated ICalAttendee attendees = 5;
    repeated ICalFreeBusyPeriod free_busy = 6;
    string url = 7;
    google.protobuf.Timestamp dtstamp = 8;
    string comment = 9;
}

// RFC 5545 §3.8.2.6 FREEBUSY property entry.
message ICalFreeBusyPeriod {
    google.protobuf.Timestamp start = 1;
    google.protobuf.Duration duration = 2;
    string fb_type = 3;                               // FREE/BUSY/BUSY-UNAVAILABLE/BUSY-TENTATIVE
}

// RFC 5545 §3.6.5 VTIMEZONE — timezone definition with STANDARD/DAYLIGHT.
message ICalTimezone {
    string tzid = 1;
    string tzurl = 2;
    google.protobuf.Timestamp last_modified = 3;
    repeated ICalTimezoneObservance standard = 4;
    repeated ICalTimezoneObservance daylight = 5;
}

// RFC 5545 §3.6.5 STANDARD / DAYLIGHT observance.
message ICalTimezoneObservance {
    google.protobuf.Timestamp dt_start = 1;
    string tz_offset_from = 2;
    string tz_offset_to = 3;
    string tz_name = 4;
    string rrule = 5;
    repeated google.protobuf.Timestamp rdate = 6;
    string comment = 7;
}

// RFC 5545 §3.4 VCALENDAR — top-level wrapper (equivalent to a .ics file).
message ICalendar {
    string prodid = 1;
    string version = 2;
    string calscale = 3;                              // GREGORIAN
    string method = 4;                                // PUBLISH/REQUEST/REPLY/CANCEL/...
    repeated ICalEvent events = 5;
    repeated ICalTodo todos = 6;
    repeated ICalJournal journals = 7;
    repeated ICalFreeBusy free_busy = 8;
    repeated ICalTimezone timezones = 9;
    string name = 10;                                 // NAME (RFC 7986)
    string description = 11;                          // DESCRIPTION (RFC 7986)
    string url = 12;
    string color = 13;
    string image = 14;
    string refresh_interval = 15;
    string source = 16;
    repeated string categories = 17;
}

// GeoJSON Point (google.type.LatLng + altitude)
message GeoPoint {
    double longitude = 1;
    double latitude = 2;
    double altitude = 3;
}

// GeoIP — links IP → country → all localized formats
message GeoIp {
    string ip = 1;                                    // IpAddress (v4/v6)
    string country = 2;                               // ISO 3166-1 alpha-2
    string city = 3;
    string region = 4;
    string postal_code = 5;
    string timezone = 6;                              // IANA timezone ID
    string locale = 7;                                // BCP 47 locale tag
    google.type.Money currency_sample = 8;            // google.type.Money
    string currency_code = 9;                         // ISO 4217
    string phone_code = 10;                           // +1, +44, +81
    google.type.LatLng location = 11;                 // google.type.LatLng
}

// Measure — ICU CLDR + PostGIS + GeoJSON compatible quantity.
//
// Unit follows CLDR unit identifier format: "length-meter", "mass-kilogram",
// "speed-kilometer-per-hour", "digital-megabyte", "duration-second".
// See: https://unicode.org/reports/tr35/tr35-general.html#Unit_Identifiers
//
// Interop:
// - ICU: com.ibm.icu.util.Measure(Number, MeasureUnit) via MeasureUnit.forIdentifier()
// - PostGIS: M-coordinate in geometry (ST_MakePointM, ST_M)
// - GeoJSON: position array [lon, lat, alt, m] — the 4th element
// - UCUM: parseable via ucum-java for medical/scientific units
message Measure {
    double value = 1;                   // numeric value
    string unit = 2;                    // CLDR unit identifier: "length-meter"
    string system = 3;                  // "metric" | "ussystem" | "uksystem" | "ucum"
    string display_name = 4;            // localized name (optional, e.g., "kilometers")
    double uncertainty = 5;             // ± range (for scientific measurements)
}

// PatchEvent — universal mutation event (SSE + WebSocket sync)
message PatchEvent {
    string op = 1;                                    // add/replace/remove/patch
    string entity_id = 2;
    bytes before = 3;                                 // serialized entity
    bytes after = 4;
    repeated PatchOperation patch = 5;
    google.protobuf.Timestamp timestamp = 6;
}

// JSON Patch operation (RFC 6902)
message PatchOperation {
    string op = 1;                                    // add/remove/replace/move/copy/test
    string path = 2;                                  // JSON Pointer (RFC 6901)
    string value = 3;
    string from = 4;                                  // for move/copy
}
