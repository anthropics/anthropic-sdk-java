name: CI
on:
  push:
    branches:
      - '**'
      - '!integrated/**'
      - '!stl-preview-head/**'
      - '!stl-preview-base/**'
      - '!generated'
      - '!codegen/**'
      - 'codegen/stl/**'
  pull_request:
    branches-ignore:
      - 'stl-preview-head/**'
      - 'stl-preview-base/**'

jobs:
  lint:
    timeout-minutes: 15
    name: lint
    runs-on: 'ubuntu-latest-16-core'
    if: (github.event_name == 'push' || github.event.pull_request.head.repo.fork)

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: |
            8
            21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4.4.3
        with:
          # Required for configuration-cache data to be saved/restored across CI runs.
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Run lints
        run: ./scripts/lint

  build:
    # The first run on a fresh cache compiles everything and generates all documentation, which
    # does not fit in 15 minutes; cached runs are much faster.
    timeout-minutes: 30
    name: build
    permissions:
      contents: read
      id-token: write
    runs-on: 'ubuntu-latest-16-core'
    if: (github.event_name == 'push' || github.event.pull_request.head.repo.fork)

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: |
            8
            21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4.4.3
        with:
          # Required for configuration-cache data to be saved/restored across CI runs.
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Build SDK
        run: ./scripts/build

      - name: Build local Maven repo
        if: |-
          github.repository == 'anthropics/anthropic-sdk-java-private' &&
          !startsWith(github.ref, 'refs/heads/stl/')
        run: ./gradlew publishMavenPublicationToLocalFileSystemRepository -PpublishLocal

      - name: Get GitHub OIDC Token
        if: |-
          github.repository == 'anthropics/anthropic-sdk-java-private' &&
          !startsWith(github.ref, 'refs/heads/stl/')
        id: github-oidc
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: core.setOutput('github_token', await core.getIDToken());

      - name: Upload Maven artifacts
        if: |-
          github.repository == 'anthropics/anthropic-sdk-java-private' &&
          !startsWith(github.ref, 'refs/heads/stl/')
        env:
          URL: https://pkg.stainless.com/s
          AUTH: ${{ steps.github-oidc.outputs.github_token }}
          SHA: ${{ github.sha }}
          PROJECT: anthropic-java
        run: ./scripts/upload-artifacts
  test:
    timeout-minutes: 30
    name: test
    runs-on: 'ubuntu-latest-16-core'
    if: github.event_name == 'push' || github.event.pull_request.head.repo.fork
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: |
            8
            21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4.4.3
        with:
          # Required for configuration-cache data to be saved/restored across CI runs.
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Run tests
        run: ./scripts/test

  detect_breaking_changes_vs_main:
    timeout-minutes: 15
    name: detect-breaking-changes-vs-main
    runs-on: ${{ github.repository == 'stainless-sdks/anthropic-java' && 'depot-ubuntu-24.04' || 'ubuntu-latest-16-core' }}
    if: |-
      (github.event_name == 'push' &&
       !startsWith(github.ref, 'refs/heads/release-please--')) ||
      github.event.pull_request.head.repo.fork
    steps:
      # fetch-depth: 0 fetches full commit history (all branches, so
      # origin/main is available) so `git merge-base HEAD origin/main`
      # below can resolve the fork point. filter: blob:none keeps the
      # fetch cheap: commit metadata is downloaded eagerly, file blobs
      # only when a later `git checkout` asks for them.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          filter: blob:none

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: |
            8
            21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4.4.3
        with:
          # Required for configuration-cache data to be saved/restored across CI runs.
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Determine base SHA
        run: |
          BASE_SHA=$(git merge-base HEAD origin/main 2>/dev/null || echo "")
          echo "BASE_SHA=$BASE_SHA" >> $GITHUB_ENV

      - name: Detect breaking changes vs. main
        if: env.BASE_SHA != ''
        run: |
          # Try to check out previous versions of the breaking change detection script. This ensures that
          # we still detect breaking changes when entire files and their tests are removed.
          git checkout "$BASE_SHA" -- ./scripts/detect-breaking-changes 2>/dev/null || true
          ./scripts/detect-breaking-changes "$BASE_SHA"
