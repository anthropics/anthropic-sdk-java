name: KMP CI
on:
  push:
    branches: [claude/convert-to-kmp-*]
  pull_request:
    branches: [main]

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"

jobs:
  build-jvm:
    name: JVM Build + Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build api-kmp (JVM + JS)
        run: ./gradlew :api-kmp:compileKotlinJvm :api-kmp:compileKotlinJs --no-configuration-cache

      - name: Test api-kmp (JVM)
        run: ./gradlew :api-kmp:jvmTest --no-configuration-cache

      - name: Test api-kmp (JS Node)
        run: ./gradlew :api-kmp:jsNodeTest --no-configuration-cache

      - name: Build anthropic-java-core
        run: ./gradlew :anthropic-java-core:compileKotlinJvm :anthropic-java-client-okhttp:compileKotlin --no-configuration-cache

      - name: Test anthropic-java-core
        run: SKIP_MOCK_TESTS=true ./gradlew :anthropic-java-core:jvmTest --no-configuration-cache

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-jvm
          path: |
            api-kmp/build/reports/tests/
            anthropic-java-core/build/reports/tests/
